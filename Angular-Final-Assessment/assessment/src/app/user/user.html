<div class="grid">
  <div *ngIf="isLoading" class="loading">Loading users...</div>
  <div *ngIf="errorMessage" class="error">{{ errorMessage }}</div>
  <div class="card" *ngFor="let user of users">
    <img [src]="user.avatar" alt="user">
    <h4>{{ user.name }}</h4>
    <p>{{ user.email }}</p>
  </div>
</div>
